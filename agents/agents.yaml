# MyGO — Agent Registry
# 
# Map your IDE tools to roles. You can use ANY IDE here.
# The system only cares about roles (builder, reviewer), not IDE names.
#
# driver: how to invoke the agent
#   "file"  — write TASK.md, user manually tells IDE (default)
#   "cli"   — spawn CLI tool automatically (fully automated)
#   "gui"   — macOS AppleScript auto-control desktop IDE app
#
# command: CLI command template (only for driver: cli)
#   Use {task_file} as placeholder for TASK.md path
#   Use {outbox_file} as placeholder for outbox JSON path
#
# app_name: macOS app name (only for driver: gui)
#
# To add a new IDE/tool, just add it here. No code changes needed.

version: 2

agents:
  - id: windsurf
    driver: file
    capabilities: [planning, implementation, testing, docs]
    
  - id: cursor
    driver: file
    capabilities: [planning, implementation, testing, review, docs]
    
  - id: claude
    driver: cli
    command: "claude -p 'Read {task_file} and complete ALL tasks described in it. After finishing, save a JSON object to {outbox_file} with these REQUIRED fields: status (completed/blocked), summary (what you did), changed_files (list of absolute paths you modified). Example: {{\"status\":\"completed\",\"summary\":\"Added auth middleware\",\"changed_files\":[\"/src/auth.py\"]}}' --allowedTools Read,Edit,Bash,Write --output-format text"
    capabilities: [planning, implementation, testing, review, docs, security]

  - id: codex
    driver: gui
    app_name: "Codex"
    capabilities: [planning, implementation, testing, review, docs]

  - id: codex-cli
    driver: cli
    command: "python3 {project_root}/scripts/codex_exec_agent.py --task-file {task_file} --outbox-file {outbox_file} --timeout-sec 180"
    auth_check: "codex --version"
    login_hint: "Run: codex login"
    capabilities: [planning, implementation, testing, review, docs, security]

  - id: aider
    driver: cli
    command: "aider --message 'Read {task_file} and complete the task. Save the JSON output to {outbox_file}' --yes"
    capabilities: [planning, implementation, testing, review]

  - id: mock
    driver: cli
    command: "python3 {project_root}/scripts/mock_cli_agent.py --task-file {task_file} --outbox-file {outbox_file}"
    capabilities: [planning, implementation, testing, review, docs, security]

  - id: antigravity
    driver: file
    capabilities: [planning, implementation, review, security]

  - id: kiro
    driver: file
    capabilities: [planning, implementation, testing, review]

# Role assignment strategy:
#   "manual"  — user picks which IDE does what (default, best UX)
#   "auto"    — system picks based on capabilities (legacy mode)
role_strategy: manual

# Default role mapping (used when role_strategy is "manual")
# You can override per-task with: my go --builder windsurf --reviewer antigravity
defaults:
  builder: windsurf
  reviewer: antigravity
